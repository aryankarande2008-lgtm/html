<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
</head>
<body>

    <h2>Student Table</h2>

    <table border="1" cellpadding="8">
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Rahul</td>
            <td>Computer</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Suraj</td>
            <td>IT</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Amit</td>
            <td>Mechanical</td>
        </tr>
    </table>

    <br><br>

    <h2>Student Registration Form</h2>

    <form>
        Full Name:<br>
        <input type="text"><br><br>

        Email:<br>
        <input type="email"><br><br>

        Password:<br>
        <input type="password"><br><br>

        Gender:<br>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        Select Course:<br>
        <select>
            <option>Computer</option>
            <option>IT</option>
            <option>Mechanical</option>
            <option>Civil</option>
        </select>

        <br><br>

        Message:<br>
        <textarea rows="5" cols="30"></textarea>

        <br><br>

        <input type="submit" value="Register">
    </form>

</body>
</html>
